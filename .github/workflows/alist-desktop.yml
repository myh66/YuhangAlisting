name: AList Desktop CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: alist-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: alist-desktop/yarn.lock
      - uses: dtolnay/rust-toolchain@stable
      - name: Enable Corepack
        run: corepack enable
      - name: Install frontend dependencies
        run: yarn install --immutable
      - name: Build frontend
        run: yarn build
      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

  release-build:
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis,msi
          - os: macos-latest
            bundles: dmg
          - os: ubuntu-latest
            bundles: appimage,deb
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: alist-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: alist-desktop/yarn.lock
      - uses: dtolnay/rust-toolchain@stable
      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Download sidecar binaries
        run: yarn prebuild --force
      - name: Build Tauri bundles
        run: yarn tauri build --bundles ${{ matrix.bundles }} --ci
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: alist-desktop-${{ runner.os }}
          path: alist-desktop/src-tauri/target/release/bundle/**
