name: YuhangAlisting

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: alist-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: alist-desktop/yarn.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build frontend
        run: yarn build

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

  release:
    name: Release (${{ matrix.platform }})
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis,msi"
          - platform: macos-latest
            args: "--bundles app,dmg"
          - platform: ubuntu-22.04
            args: "--bundles appimage,deb"
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: alist-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: alist-desktop/yarn.lock

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Download sidecars
        run: yarn prebuild --force

      - name: Build desktop bundles
        run: yarn tauri build ${{ matrix.args }} --ci

      - name: Normalize macOS app signature
        if: matrix.platform == 'macos-latest'
        run: codesign --force --deep --sign - src-tauri/target/release/bundle/macos/YuhangAlisting.app

      - name: Zip macOS app bundle
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/target/release/bundle/macos
          ditto -c -k --sequesterRsrc --keepParent YuhangAlisting.app YuhangAlisting_${{ github.ref_name || github.run_number }}_aarch64.app.zip

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          name: YuhangAlisting ${{ github.ref_name }}
          files: |
            alist-desktop/src-tauri/target/release/bundle/dmg/*.dmg
            alist-desktop/src-tauri/target/release/bundle/macos/*.zip
            alist-desktop/src-tauri/target/release/bundle/nsis/*.exe
            alist-desktop/src-tauri/target/release/bundle/msi/*.msi
            alist-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            alist-desktop/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload manual artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: yuhang-alisting-${{ matrix.platform }}
          path: alist-desktop/src-tauri/target/release/bundle/**
